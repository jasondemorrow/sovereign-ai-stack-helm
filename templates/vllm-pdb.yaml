{{- range .Values.backends }}
{{- if .pdb.create }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "sovereign-ai-gateway.fullname" $ }}-vllm-{{ .name }}
  labels:
    app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" $ }}-vllm-{{ .name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
spec:
  minAvailable: {{ .pdb.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" $ }}-vllm-{{ .name }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
{{- end }}
{{- end }}
