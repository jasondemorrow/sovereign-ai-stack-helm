{{- if .Values.vllm.pdb.create }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "sovereign-ai-gateway.fullname" . }}-vllm
  labels:
    app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-vllm
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  minAvailable: {{ .Values.vllm.pdb.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-vllm
      app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
