{{- if .Values.openwebui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sovereign-ai-gateway.fullname" . }}-openwebui
  labels:
    app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-openwebui
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.openwebui.service.type }}
  ports:
    - port: {{ .Values.openwebui.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-openwebui
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
