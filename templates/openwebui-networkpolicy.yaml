{{- if and .Values.openwebui.enabled .Values.openwebui.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sovereign-ai-gateway.fullname" . }}-openwebui-isolation
  labels:
    app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-openwebui
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-openwebui
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow all ingress to the WebUI so end users can connect
    - {}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-litellm
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: {{ .Values.litellm.service.port }}
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: {{ include "sovereign-ai-gateway.fullname" . }}-postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
