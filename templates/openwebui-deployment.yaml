{{- if .Values.openwebui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sovereign-ai-gateway.fullname" . }}-openwebui
  labels:
    app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-openwebui
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.openwebui.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-openwebui
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-openwebui
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- if .Values.openwebui.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.openwebui.podSecurityContext | nindent 8 }}
      {{- end }}
      {{- if .Values.openwebui.affinity }}
      affinity:
        {{- toYaml .Values.openwebui.affinity | nindent 8 }}
      {{- end }}
      containers:
        - name: openwebui
          image: "{{ .Values.openwebui.image.repository }}:{{ .Values.openwebui.image.tag }}"
          imagePullPolicy: {{ .Values.openwebui.image.pullPolicy }}
          {{- if .Values.openwebui.securityContext }}
          securityContext:
            {{- toYaml .Values.openwebui.securityContext | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: WEBUI_SECRET_KEY
              value: "super-secure-testing-secret-key"
            - name: OPENAI_API_BASE_URL
              value: "http://{{ include "sovereign-ai-gateway.fullname" . }}-litellm:{{ if .Values.litellm.service }}{{ default 4000 .Values.litellm.service.port }}{{ else }}4000{{ end }}/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "sovereign-ai-gateway.fullname" . }}-shared-secret
                  key: token
                  optional: true
            {{- if .Values.postgresql.enabled }}
            - name: DATABASE_URL
              value: "postgresql://app_user:{{ .Values.postgresql.auth.dbPassword }}@{{ include "sovereign-ai-gateway.fullname" . }}-postgres-rw:5432/sovereign_ai"
            - name: VECTOR_DB
              value: "pgvector"
            {{- end }}
          {{- if .Values.openwebui.probes }}
          {{- toYaml .Values.openwebui.probes | nindent 10 }}
          {{- end }}
          resources:
            {{- toYaml .Values.openwebui.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: openwebui-home
              mountPath: /app/backend/data
            - name: cache
              mountPath: /.cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: openwebui-home
          emptyDir: {}
        - name: cache
          emptyDir: {}
{{- end }}
