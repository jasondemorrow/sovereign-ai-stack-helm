{{- range .Values.backends }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sovereign-ai-gateway.fullname" $ }}-vllm-{{ .name }}
  labels:
    app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" $ }}-vllm-{{ .name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
spec:
  replicas: {{ .replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" $ }}-vllm-{{ .name }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" $ }}-vllm-{{ .name }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
    spec:
      {{- if .podSecurityContext }}
      securityContext:
        {{- toYaml .podSecurityContext | nindent 8 }}
      {{- end }}
      {{- if .affinity }}
      affinity:
        {{- toYaml .affinity | nindent 8 }}
      {{- end }}
      containers:
        - name: vllm
          image: "{{ .image.repository }}:{{ .image.tag }}"
          imagePullPolicy: {{ .image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .service.port }}
              protocol: TCP
          {{- if .securityContext }}
          securityContext:
            {{- toYaml .securityContext | nindent 12 }}
          {{- end }}
          {{- if .probes }}
          {{- toYaml .probes | nindent 10 }}
          {{- end }}
          env:
            - name: USER
              value: "vllm"
            - name: HF_HOME
              value: "/.cache/huggingface"
            {{- if .extraEnv }}
            {{- toYaml .extraEnv | nindent 12 }}
            {{- end }}
          args:
            {{- if and .device (ne .device "auto") }}
            - "--device"
            - {{ .device | quote }}
            {{- end }}
            {{- if .extraArgs }}
            {{- range .extraArgs }}
            - {{ . | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: hf-cache
              mountPath: /.cache/huggingface
      volumes:
        - name: tmp
          emptyDir: {}
        - name: hf-cache
          {{- if .persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "sovereign-ai-gateway.fullname" $ }}-vllm-cache-{{ .name }}
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
