{{- if and .Values.postgresql.enabled .Values.postgresql.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sovereign-ai-gateway.fullname" . }}-postgres-isolation
  labels:
    app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-litellm
              app.kubernetes.io/instance: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-openwebui
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432
{{- end }}
