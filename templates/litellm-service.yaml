{{- $litellm := include "sovereign-ai-gateway.litellm" . | fromYaml -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sovereign-ai-gateway.fullname" . }}-litellm
  labels:
    app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-litellm
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ $litellm.service.type }}
  ports:
    - port: {{ $litellm.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-litellm
    app.kubernetes.io/instance: {{ .Release.Name }}
