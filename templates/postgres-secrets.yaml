{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sovereign-ai-gateway.fullname" . }}-postgres-app-secret
  labels:
    app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
type: kubernetes.io/basic-auth
stringData:
  password: {{ .Values.postgresql.auth.dbPassword | quote }}
  username: "app_user"
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sovereign-ai-gateway.fullname" . }}-postgres-init-sql
  labels:
    app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
{{- end }}
