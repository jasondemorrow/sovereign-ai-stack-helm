{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sovereign-ai-gateway.fullname" . }}-postgres-litellm-secret
  labels:
    app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
type: kubernetes.io/basic-auth
stringData:
  password: {{ .Values.postgresql.auth.litellmPassword | quote }}
  username: "litellm"
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sovereign-ai-gateway.fullname" . }}-postgres-webui-secret
  labels:
    app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
type: kubernetes.io/basic-auth
stringData:
  password: {{ .Values.postgresql.auth.webuiPassword | quote }}
  username: "webui"
  uri: "postgresql://webui:{{ .Values.postgresql.auth.webuiPassword }}@{{ include "sovereign-ai-gateway.fullname" . }}-postgres-pooler-rw:5432/webui_state"
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sovereign-ai-gateway.fullname" . }}-postgres-init-sql
  labels:
    app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  init.sql: |
    CREATE DATABASE webui_state;
    CREATE ROLE webui WITH LOGIN PASSWORD '{{ .Values.postgresql.auth.webuiPassword }}';
    GRANT ALL PRIVILEGES ON DATABASE webui_state TO webui;
    ALTER DATABASE webui_state OWNER TO webui;
    \c webui_state
    CREATE EXTENSION IF NOT EXISTS vector;
    \c litellm_finops
    CREATE EXTENSION IF NOT EXISTS vector;
{{- end }}
