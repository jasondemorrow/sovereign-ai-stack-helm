{{- range .Values.backends }}
{{- if .serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "sovereign-ai-gateway.fullname" $ }}-vllm-{{ .name }}
  labels:
    app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" $ }}-vllm-{{ .name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    release: {{ $.Release.Name }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" $ }}-vllm-{{ .name }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  endpoints:
    - port: http
      path: {{ .serviceMonitor.path }}
      interval: 15s
{{- end }}
{{- end }}
