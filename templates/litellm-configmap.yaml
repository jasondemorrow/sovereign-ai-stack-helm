apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sovereign-ai-gateway.fullname" . }}-litellm-config
  labels:
    app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-litellm
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  config.yaml: |
    litellm_settings:
      success_callback: ["prometheus"]
      failure_callback: ["prometheus"]
    model_list:
{{- range .Values.backends }}
      - model_name: {{ .name }}
        litellm_params:
          # This maps to the vLLM OpenAI-compatible endpoint for this specific model alias
          model: openai/{{ .modelName }}
          api_base: "http://{{ include "sovereign-ai-gateway.fullname" $ }}-vllm-{{ .name }}:{{ .service.port }}/v1"
          api_key: "sk-fake-key-because-vllm-is-internal"
{{- end }}
