apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sovereign-ai-gateway.fullname" . }}-litellm-config
  labels:
    app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-litellm
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  config.yaml: |
    model_list:
      - model_name: default-model
        litellm_params:
          # This maps to the vLLM OpenAI-compatible endpoint
          model: openai/{{ .Values.vllm.modelName }}
          api_base: "http://{{ include "sovereign-ai-gateway.fullname" . }}-vllm:{{ .Values.vllm.service.port }}/v1"
          api_key: "sk-fake-key-because-vllm-is-internal"
