{{- if and .Values.sharedSecret (default false .Values.sharedSecret.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sovereign-ai-gateway.fullname" . }}-shared-secret
  labels:
    app.kubernetes.io/name: {{ include "sovereign-ai-gateway.name" . }}-shared-secret
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  token: {{ .Values.sharedSecret.token | quote }}
{{- end }}
