postgresql:
  enabled: true
  instances: 1
  image: "ghcr.io/cloudnative-pg/postgresql:16.4"
  auth:
    dbPassword: "secure-app-password"
  resources:
    limits:
      cpu: "1"
      memory: "1Gi"
    requests:
      cpu: "500m"
      memory: "512Mi"
  persistence:
    size: 20Gi
    storageClass: ""
  networkPolicy:
    enabled: false

openwebui:
  enabled: true
  image:
    repository: ghcr.io/open-webui/open-webui
    tag: "v0.5.15"
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: "2"
      memory: "2Gi"
    requests:
      cpu: "1"
      memory: "1Gi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  networkPolicy:
    enabled: false
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
      - ALL
  probes:
    startupProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 60
    livenessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 15
      periodSeconds: 20
    readinessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 10
      periodSeconds: 10
  pdb:
    create: true
    minAvailable: 1
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
              - sovereign-ai-gateway-openwebui
          topologyKey: kubernetes.io/hostname
  serviceMonitor:
    enabled: true
    path: /metrics

observability:
  enabled: true

# Values propagated to the kube-prometheus-stack sub-chart
kube-prometheus-stack:
  grafana:
    enabled: false  # VictoriaMetrics stack provides the primary Grafana instance
  prometheus:
    prometheusSpec:
      serviceMonitorSelectorNilUsesHelmValues: false
      remoteWrite:
      - url: "http://vmauth-victoria-metrics-auth.observability.svc.cluster.local:8427/api/v1/write"
        bearerToken: "11111111-2222-3333-4444-555555555555"
