# Default values for sovereign-ai-gateway.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

litellm:
  image:
    repository: ghcr.io/berriai/litellm
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: "main-v1.41.0"
  replicaCount: 1
  service:
    type: LoadBalancer
    port: 4000
  # Vendor-specific IdP hooks go here, completely decoupled from the chart logic.
  extraEnv:
    - name: ENABLE_SSO
      value: "true"
    # Example: If the client uses Azure
    - name: AZURE_CLIENT_ID
      value: "placeholder-azure-client-id"
    - name: AZURE_TENANT_ID
      value: "placeholder-azure-tenant-id"
    # Example: If the client uses Okta
    # - name: OKTA_DOMAIN
    #   value: "..."

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    # fsGroup: 1000

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
      - ALL

  probes:
    livenessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 15
      periodSeconds: 20
    readinessProbe:
      httpGet:
        path: /health/readiness
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10

  pdb:
    create: true
    minAvailable: 1

  affinity: {}

  serviceMonitor:
    enabled: true
    path: /metrics

vllm:
  image:
    repository: vllm/vllm-openai
    pullPolicy: IfNotPresent
    tag: "latest"
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8000
  resources:
    # Default to assuming a local non-GPU setup for minikube/kind testing. 
    # Override in production values.yaml to request GPUs.
    limits:
      cpu: "4"
      memory: "8Gi"
      # nvidia.com/gpu: 1
    requests:
      cpu: "2"
      memory: "4Gi"
      # nvidia.com/gpu: 1
  # Explicitly extract the model name for cleaner usage across the configmap and deployment args
  modelName: "facebook/opt-125m"
  # Hardware device to use: auto, cuda, cpu, etc.
  device: "auto"
  extraArgs: []

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    # fsGroup: 1000

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
      - ALL

  probes:
    startupProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 60
    livenessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 15
      periodSeconds: 20
    readinessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10

  pdb:
    create: true
    minAvailable: 1

  affinity: {}

  networkPolicy:
    enabled: true

  serviceMonitor:
    enabled: true
    path: /metrics

observability:
  enabled: true
  # Values propagated to the kube-prometheus-stack sub-chart
  kube-prometheus-stack:
    grafana:
      enabled: true
    prometheus:
      prometheusSpec:
        serviceMonitorSelectorNilUsesHelmValues: false
