# Default values for sovereign-ai-gateway.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

litellm:
  image:
    repository: ghcr.io/berriai/litellm
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: "main-v1.41.0"
  replicaCount: 1
  service:
    type: LoadBalancer
    port: 4000
  # Vendor-specific IdP hooks go here, completely decoupled from the chart logic.
  extraEnv:
    - name: ENABLE_SSO
      value: "true"
    - name: PROMETHEUS_METRICS
      value: "True"
    - name: LITELLM_LOG
      value: "INFO"
    # Example: If the client uses Azure
    - name: AZURE_CLIENT_ID
      value: "placeholder-azure-client-id"
    - name: AZURE_TENANT_ID
      value: "placeholder-azure-tenant-id"
    # Example: If the client uses Okta
    # - name: OKTA_DOMAIN
    #   value: "..."

  podSecurityContext: {}
    # fsGroup: 1000

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
      - ALL

  networkPolicy:
    enabled: true

  probes:
    livenessProbe:
      httpGet:
        path: /health/readiness
        port: http
      initialDelaySeconds: 15
      periodSeconds: 20
    readinessProbe:
      httpGet:
        path: /health/readiness
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10

  pdb:
    create: true
    minAvailable: 1

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
              - sovereign-ai-gateway-litellm
          topologyKey: kubernetes.io/hostname

  serviceMonitor:
    enabled: true
    path: /metrics

sharedSecret:
  enabled: true
  token: "sk-sovereign-ai-internal-admin-token"

